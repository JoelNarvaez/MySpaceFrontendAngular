<section class="min-h-screen bg-[#F5F5F4] flex items-center justify-center">

  <div class="bg-white p-10 rounded-[2rem] w-full max-w-md shadow-xl">

    <h2 class="text-center text-2xl mb-8 text-[#1E3A5F]">
      Nueva contraseña
    </h2>

    <form [formGroup]="form" (ngSubmit)="guardar()">

      <input
        type="password"
        formControlName="password"
        placeholder="Nueva contraseña"
        class="w-full border rounded-full px-5 py-3 mb-6">

      <button
        type="submit"
        class="w-full bg-[#1E3A5F] text-white py-3 rounded-full">

        Guardar contraseña

      </button>

    </form>

  </div>

</section>
